version: 2.1

executors:
  lua:
    docker:
      - image: cimg/base:stable

jobs:
  build-rock:
    executor: lua
    steps:
      - checkout
      - run:
          name: Install LuaRocks and LuaJIT
          command: |
            sudo apt-get update
            sudo apt-get install -y luarocks luajit
      - run:
          name: Build and pack kong-plugin-acme rock
          command: |
            set -euo pipefail

            ROCKSPEC=$(ls kong-plugin-acme-*.rockspec | head -n1)
            VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' "$ROCKSPEC")

            if [ -z "$VERSION" ]; then
              echo "failed to parse version from $ROCKSPEC"
              exit 1
            fi

            luarocks --local make "$ROCKSPEC"
            luarocks --local pack kong-plugin-acme "$VERSION"

            mkdir -p dist
            mv "kong-plugin-acme-${VERSION}.all.rock" dist/
            echo "Built artifact: dist/kong-plugin-acme-${VERSION}.all.rock"
      - store_artifacts:
          path: dist
          destination: rocks

workflows:
  version: 2
  build:
    jobs:
      - build-rock
